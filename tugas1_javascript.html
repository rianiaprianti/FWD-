<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 1 - Menghitung Luas Bangun Datar</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; }
        .hasil { background: #f4f4f4; padding: 15px; border-radius: 8px; border-left: 5px solid #333; }
        h2 { color: #2c3e50; }
    </style>
</head>
<body>

    <h2>Hasil Perhitungan Luas Bangun Datar</h2>
    <div class="hasil">
        <script>
            /**
             * 1. Menghitung Luas Persegi Panjang
             * Rumus: panjang * lebar
             */
            const panjangPP = 10;
            const lebarPP = 5;
            const luasPersegiPanjang = panjangPP * lebarPP; // Menggunakan operator perkalian (*)

            document.write("<p><b>1. Persegi Panjang:</b><br>");
            document.write("Panjang: " + panjangPP + ", Lebar: " + lebarPP + "<br>");
            document.write("Luas = " + luasPersegiPanjang + "</p>");

            /**
             * 2. Menghitung Luas Bujur Sangkar (Persegi)
             * Rumus: sisi * sisi
             */
            const sisiBujurSangkar = 8;
            const luasBujurSangkar = sisiBujurSangkar * sisiBujurSangkar;

            document.write("<p><b>2. Bujur Sangkar (Persegi):</b><br>");
            document.write("Sisi: " + sisiBujurSangkar + "<br>");
            document.write("Luas = " + luasBujurSangkar + "</p>");

            /**
             * 3. Menghitung Luas Segitiga
             * Rumus: 0.5 * alas * tinggi
             */
            const alasSegitiga = 12;
            const tinggiSegitiga = 7;
            const luasSegitiga = 0.5 * alasSegitiga * tinggiSegitiga; // Menggunakan operator perkalian

            document.write("<p><b>3. Segitiga:</b><br>");
            document.write("Alas: " + alasSegitiga + ", Tinggi: " + tinggiSegitiga + "<br>");
            document.write("Luas = " + luasSegitiga + "</p>");
        </script>
    </div>

</body>
</html>
